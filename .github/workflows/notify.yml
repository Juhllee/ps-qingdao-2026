name: Push Notification on Update

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (commit msg 읽기용)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse commit message and send notification
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          ONESIGNAL_APP_ID: 7afe8559-29f9-4312-9a93-22b1a2be4c8d
        run: |
          # 최근 커밋 메시지
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # [skip notify] 있으면 발송 건너뛰기
          if echo "$COMMIT_MSG" | grep -qiE "\[skip notify\]|\[no notify\]"; then
            echo "✋ Skipping notification (contains skip flag)"
            exit 0
          fi

          # [notify:타이틀] 본문 형식 파싱
          # 예: "[notify:호텔 변경] Mehood → 샤오다오로 숙소 바뀜"
          TITLE=$(echo "$COMMIT_MSG" | python3 -c "
          import sys, re
          msg = sys.stdin.read().strip()
          m = re.match(r'\[notify:([^\]]+)\]\s*(.*)', msg, re.DOTALL)
          if m:
            print(m.group(1).strip())
          elif msg.startswith('[notify]'):
            print('🍺 칭다오 일정 업데이트')
          else:
            print('')
          ")

          BODY=$(echo "$COMMIT_MSG" | python3 -c "
          import sys, re
          msg = sys.stdin.read().strip()
          m = re.match(r'\[notify:[^\]]+\]\s*(.*)', msg, re.DOTALL)
          if m:
            body = m.group(1).strip()
          elif msg.startswith('[notify]'):
            body = msg[len('[notify]'):].strip()
          else:
            body = ''
          # 첫 줄만 사용 (최대 200자)
          body = body.split('\n')[0][:200]
          print(body)
          ")

          # title 비어있으면 알림 보내지 않음 (commit에 [notify] 안 들어간 일반 push)
          if [ -z "$TITLE" ]; then
            echo "ℹ️ No [notify] flag in commit message — skipping push notification"
            exit 0
          fi

          # body 비어있으면 기본값
          if [ -z "$BODY" ]; then
            BODY="앱에서 최신 정보를 확인해주세요"
          fi

          echo "📢 Sending notification..."
          echo "   Title: $TITLE"
          echo "   Body:  $BODY"

          # OneSignal REST API 호출 (Python으로 JSON 안전하게 생성)
          PAYLOAD=$(TITLE="$TITLE" BODY="$BODY" APP_ID="$ONESIGNAL_APP_ID" python3 -c "
          import os, json
          payload = {
            'app_id': os.environ['APP_ID'],
            'included_segments': ['Subscribed Users'],
            'headings': {'en': os.environ['TITLE'], 'ko': os.environ['TITLE']},
            'contents': {'en': os.environ['BODY'], 'ko': os.environ['BODY']},
            'url': 'https://juhllee.github.io/ps-qingdao-2026/',
            'chrome_web_icon': 'https://juhllee.github.io/ps-qingdao-2026/icon-192.png',
            'chrome_web_badge': 'https://juhllee.github.io/ps-qingdao-2026/icon-192.png'
          }
          print(json.dumps(payload, ensure_ascii=False))
          ")

          RESPONSE=$(curl -s -X POST https://api.onesignal.com/notifications \
            -H "Authorization: Key $ONESIGNAL_API_KEY" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"

          # 성공 / 구독자 없음 / 실패 구분
          if echo "$RESPONSE" | grep -q '"recipients"'; then
            echo "✅ Notification sent successfully"
          elif echo "$RESPONSE" | grep -q "All included players are not subscribed"; then
            echo "ℹ️ No subscribed users yet (아직 알림 권한 허용한 사용자가 없음) — 정상"
          else
            echo "❌ Notification failed"
            exit 1
          fi
